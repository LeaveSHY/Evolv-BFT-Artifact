# ============================================================================
# Evolv-BFT — Docker Compose for Local Testing (4 nodes)
# ============================================================================
# SETUP:
#   1. Generate genesis with Docker hostnames:
#      cd ../src && go run ./cmd/evolvbft-genesis -nodes=4 -seed=localtest \
#         -base-host=evolvbft-node -base-port=8080 -out=../deploy/configs/genesis.json
#   2. Generate per-node manifests:
#      cd ../deploy && python3 generate_config.py --nodes 4 --compose \
#         --manifest configs/genesis.json --output-dir configs
#   3. Start cluster:
#      docker compose -f docker-compose-local.yml up -d
# Stop:    docker compose -f docker-compose-local.yml down -v
# Logs:    docker compose -f docker-compose-local.yml logs -f
# ============================================================================

services:
  # ── Node 0 ──────────────────────────────────────────────────────────────
  evolvbft-node-0:
    image: evolvbft:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: evolvbft-node-0
    hostname: evolvbft-node-0
    command: >
      -id=0
      -port=8080
      -http=9000
      -total-nodes=4
      -initial-validators=4
      -instances=5
      -batch-txs=2048
      -timeout-ms=1000
      -inbound-msg-queue=4096
      -inbound-tx-queue=32768
      -orderer-pending-cap=32768
      -consensus-topic=evolvbft-consensus
      -manifest=/config/manifests/node-0-manifest.json
    ports:
      - "9000:9000"      # HTTP admin/metrics
      - "8080:8080"      # P2P libp2p
    networks:
      - evolvbft-net
    volumes:
      - ./configs:/config:ro
      - evolvbft-data-0:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9000/metrics"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

