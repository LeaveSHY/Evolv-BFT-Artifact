# ============================================================================
# Evolv-BFT — Headless Service for StatefulSet peer discovery
# ============================================================================
# Provides stable DNS entries:
#   evolvbft-{i}.evolvbft-headless.default.svc.cluster.local
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: evolvbft-headless
  namespace: default
  labels:
    app: evolvbft
    component: consensus
spec:
  clusterIP: None
  selector:
    app: evolvbft
  ports:
    - name: p2p
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: http
      port: 9000
      targetPort: 9000
      protocol: TCP
  publishNotReadyAddresses: true

---
# ============================================================================
# Client-facing service for external HTTP access (load-balanced)
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: evolvbft-http
  namespace: default
  labels:
    app: evolvbft
    component: consensus
spec:
  type: ClusterIP
  selector:
    app: evolvbft
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      protocol: TCP
